# Test cases for `tensor`, drafted from regression.sh.in (review/collapse).
category: tensor
defaults:
  xlen:
  - 32
  - 64
  tier: fast
  touches: [hw/rtl/tcu, sim/simx/tcu, sw/kernel/include/vx_tensor.h]
tests:
- id: sgemm_tcu-1
  via: blackbox
  drivers:
  - simx
  app: sgemm_tcu
  configs: -DVX_CFG_NUM_THREADS=2 -DVX_CFG_EXT_TCU_ENABLE -DVX_CFG_TCU_INT8_ENABLE -DITYPE=int8 -DOTYPE=int32
  flags: --debug=3 --log=run_simx.log
- id: sgemm_tcu-2
  via: blackbox
  drivers:
  - simx
  app: sgemm_tcu
  configs: -DVX_CFG_NUM_THREADS=4 -DVX_CFG_EXT_TCU_ENABLE -DVX_CFG_TCU_INT4_ENABLE -DITYPE=uint4 -DOTYPE=int32
- id: sgemm_tcu-3
  via: blackbox
  drivers:
  - simx
  app: sgemm_tcu
  configs: -DVX_CFG_NUM_THREADS=8 -DVX_CFG_EXT_TCU_ENABLE -DVX_CFG_ISSUE_WIDTH=2 -DITYPE=fp16 -DOTYPE=fp32
- id: sgemm_tcu-4
  via: blackbox
  drivers:
  - simx
  app: sgemm_tcu
  configs: -DVX_CFG_NUM_THREADS=16 -DVX_CFG_EXT_TCU_ENABLE -DITYPE=bf16 -DOTYPE=bf16
- id: sgemm_tcu-5
  via: blackbox
  drivers:
  - simx
  app: sgemm_tcu
  configs: -DVX_CFG_NUM_THREADS=8 -DVX_CFG_EXT_TCU_ENABLE -DVX_CFG_ISSUE_WIDTH=2 -DVX_CFG_TCU_FP8_ENABLE -DITYPE=fp8 -DOTYPE=fp32
- id: sgemm_tcu-6
  via: blackbox
  drivers:
  - simx
  app: sgemm_tcu
  configs: -DVX_CFG_NUM_THREADS=16 -DVX_CFG_EXT_TCU_ENABLE -DVX_CFG_TCU_FP8_ENABLE -DITYPE=bf8 -DOTYPE=bf8
- id: sgemm_tcu-7
  via: blackbox
  drivers:
  - simx
  app: sgemm_tcu
  configs: -DVX_CFG_NUM_THREADS=4 -DVX_CFG_EXT_TCU_ENABLE -DVX_CFG_TCU_TF32_ENABLE -DITYPE=tf32 -DOTYPE=fp32
- id: sgemm2_tcu-1
  via: blackbox
  drivers:
  - simx
  app: sgemm2_tcu
  configs: -DVX_CFG_NUM_THREADS=8 -DVX_CFG_NUM_WARPS=8 -DVX_CFG_ISSUE_WIDTH=4 -DVX_CFG_EXT_TCU_ENABLE -DITYPE=fp16 -DOTYPE=fp32
  args: -w 4
- id: sgemm_tcu-8
  via: blackbox
  drivers:
  - rtlsim
  app: sgemm_tcu
  configs: -DVX_CFG_NUM_THREADS=2 -DVX_CFG_EXT_TCU_ENABLE -DVX_CFG_TCU_TYPE_DPI -DVX_CFG_TCU_INT8_ENABLE -DITYPE=int8 -DOTYPE=int32
  flags: --debug=3 --log=run_rtlsim.log
- id: sgemm_tcu-9
