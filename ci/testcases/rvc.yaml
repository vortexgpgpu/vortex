# Test cases for `rvc`, drafted from regression.sh.in (review/collapse).
category: rvc
defaults:
  xlen:
  - 32
  - 64
  tier: fast
tests:
- id: isa-32c-1
  via: make-run
  drivers:
  - simx
  dir: tests/riscv/isa
  target: run-{driver}-32c
- id: isa-32c-2
  via: make-run
  drivers:
  - rtlsim
  dir: tests/riscv/isa
  target: run-{driver}-32c
- id: isa-64c-1
