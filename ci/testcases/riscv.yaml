# Test cases for `riscv`, drafted from regression.sh.in (review/collapse).
category: riscv
defaults:
  xlen:
  - 32
  - 64
  tier: fast
tests:
- id: isa-1
  via: make-run
  drivers:
  - simx
  dir: tests/riscv
  target: run-{driver}
- id: isa-2
  via: make-run
  drivers:
  - rtlsim
  dir: tests/riscv
  target: run-{driver}
- id: isa-32f-1
