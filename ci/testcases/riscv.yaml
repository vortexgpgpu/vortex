# Test cases for `riscv`, drafted from regression.sh.in (review/collapse).
category: riscv
defaults:
  # The ISA suite covers atomics (rv32ua/rv64ua) and compressed (rv32uc/rv64uc),
  # so the sim must be built with those extensions — matching legacy regression
  # which built simx/rtlsim with EXT_A_ENABLE + EXT_C_ENABLE before the run.
  # Without them the sim correctly aborts on the first AMO op.
  configs: "-DVX_CFG_EXT_A_ENABLE -DVX_CFG_EXT_C_ENABLE"
  xlen:
  - 32
  - 64
  tier: fast
tests:
- id: isa-1
  via: make-run
  drivers:
  - simx
  dir: tests/riscv
  target: run-{driver}
- id: isa-2
  via: make-run
  drivers:
  - rtlsim
  dir: tests/riscv
  target: run-{driver}
- id: isa-32f-1
  via: make-run
  drivers:
  - rtlsim
  dir: tests/riscv/isa
  target: run-{driver}-32f
- id: isa-32f-2
  via: make-run
  drivers:
  - rtlsim
  dir: tests/riscv/isa
  target: run-{driver}-32f
- id: isa-32f-3
  via: make-run
  drivers:
  - rtlsim
  dir: tests/riscv/isa
  target: run-{driver}-32f
- id: isa-32f-4
  via: make-run
  drivers:
  - rtlsim
  dir: tests/riscv/isa
  target: run-{driver}-32f
# RTL FPU coverage: rebuild rtlsim with the pure-RTL FPU (VX_fpu_dsp -> VX_fma/
# fdiv/fsqrt/fcvt with USE_DSP=1) instead of the default DPI/softfloat model, and
# run the F32 ISA suite (rv32uf) against it. This is the only ISA lane that
# exercises the actual FPU hardware end-to-end — every other lane bypasses it via
# the DPI model. Scoped to xlen=32 (F32 datapath; the FLEN=64 RTL path is separate).
- id: isa-32f-dsp
  via: make-run
  drivers:
  - rtlsim
  dir: tests/riscv/isa
  target: run-{driver}-32f
  configs+: "-DVX_CFG_FPU_TYPE_DSP"
  xlen:
  - 32
- id: isa-64d-1
  via: make-run
  drivers:
  - rtlsim
  dir: tests/riscv/isa
  target: run-{driver}-64d
- id: isa-64d-2
  via: make-run
  drivers:
  - rtlsim
  dir: tests/riscv/isa
  target: run-{driver}-64d
- id: isa-64f-1
  via: make-run
  drivers:
  - rtlsim
  dir: tests/riscv/isa
  target: run-{driver}-64f
- id: isa-64f-2
  via: make-run
  drivers:
  - rtlsim
  dir: tests/riscv/isa
  target: run-{driver}-64f
- id: isa-64f-3
  via: make-run
  drivers:
  - rtlsim
  dir: tests/riscv/isa
  target: run-{driver}-64f
