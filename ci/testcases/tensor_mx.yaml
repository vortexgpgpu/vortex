# MX (microscaling) tensor-core sgemm — transcribed from regression.sh.in tensor_mx().
# TCU_MX_TLS (tensor-level-scale) is a sw/test macro, not a hw VX_CFG_ knob.
category: tensor_mx
defaults:
  xlen:
  - 32
  - 64
  tier: fast
  touches: [hw/rtl/tcu, sim/simx/tcu, sw/kernel/include/vx_tensor.h]
