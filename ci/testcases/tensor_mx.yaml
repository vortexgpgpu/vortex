  via: blackbox
  drivers:
  - simx
  app: sgemm_tcu_mx
  configs: -DVX_CFG_NUM_THREADS=4 -DVX_CFG_EXT_TCU_ENABLE -DVX_CFG_TCU_MX_ENABLE -DVX_CFG_TCU_FP8_ENABLE -DITYPE=mxfp8 -DOTYPE=fp32
  args: "-k32"
- id: sgemm_tcu_mx-simx-mxfp8-nt8
