- id: sgemm_tcu-1
  via: blackbox
  drivers:
  - simx
  app: sgemm_tcu
  configs: -DVX_CFG_NUM_THREADS=8 -DVX_CFG_EXT_TCU_ENABLE -DITYPE=fp16 -DOTYPE=fp32
