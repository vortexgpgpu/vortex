# RISC-V vector extension tests (host-built simx + external runner). Native
# catalog entry — replaces the legacy regression.sh --vector delegation.
# CONFIGS (VLEN=256 + V ext) flows to `make -C sim/simx` via env.
category: vector
defaults:
  xlen: [32, 64]
  tier: slow
tests:
  - id: rvv
    via: script
    configs: "-DVX_CFG_VLEN=256 -DVX_CFG_EXT_V_ENABLE"
    run: "make -C sim/simx && VLEN=256 ./tests/riscv/riscv-vector-tests/run-test.sh"
