# Test cases for `mpi`, drafted from regression.sh.in (review/collapse).
category: mpi
defaults:
  xlen:
  - 32
  - 64
  tier: fast
tests:
- id: isa-1
  via: make-run
  drivers:
  - simx
  dir: tests/mpi/mpi_dotproduct
  target: run-{driver}
  vars:
    MPI: '1'
    NP: '4'
