# vortex2.h runtime API integration tests (tests/runtime/). Three-step host
# orchestration, so via:script:
#   1. `make -C sw/runtime simx` — the tests dlopen the simx backend
#      (libvortex-simx.so) at vx_dev_open; `make software` only builds
#      kernel+stub, and this host case has no driver sim_build to produce it,
#      so build it explicitly here.
#   2. `make -C tests/regression/basic kernel.vxbin` — test_module_kernel
#      consumes the `basic` regression .vxbin, which run-simx does NOT build.
#   3. `make -C tests/runtime run-simx` — build + run the test binaries.
category: runtime
defaults:
  xlen:
  - 32
  - 64
  tier: fast
tests:
- id: isa-1
  via: script
  run: "make -C sw/runtime simx && make -C tests/regression/basic kernel.vxbin && make -C tests/runtime run-simx"
