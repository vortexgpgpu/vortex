name: CI

on: [push, pull_request]

env:
  CCACHE_DISABLE: 1

jobs:
  setup:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Read version pins
        id: vers
        run: |
          source VERSION
          echo "toolchain=$TOOLCHAIN_REV" >> "$GITHUB_OUTPUT"

      - name: Cache Toolchain Directory
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: tools
          key: ${{ matrix.os }}-toolchain-${{ steps.vers.outputs.toolchain }}

      - name: Cache Third Party Directory
        id: cache-thirdparty
        uses: actions/cache@v4
        with:
          path: third_party
          key: ${{ matrix.os }}-thirdparty-${{ hashFiles('third_party/Makefile', '.gitmodules') }}

      - name: Install Dependencies
        if: steps.cache-toolchain.outputs.cache-hit != 'true' || steps.cache-thirdparty.outputs.cache-hit != 'true'
        run: |
          sudo bash ./ci/install_dependencies.sh

      - name: Setup Toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          TOOLDIR=$PWD/tools
          mkdir -p build
          cd build
          ../configure --tooldir=$TOOLDIR
          ci/toolchain_install.sh --all
          ci/sst_install.sh
          ci/gem5_install.sh

      - name: Setup Third Party
        if: steps.cache-thirdparty.outputs.cache-hit != 'true'
        run: |
          make -C third_party > /dev/null

      - name: Export SST paths
        run: |
          echo "$PWD/tools/sst-install/sst-core/bin" >> $GITHUB_PATH
          echo "$PWD/tools/sst-install/sst-elements/bin" >> $GITHUB_PATH
          echo "SST_CORE_HOME=$PWD/tools/sst-install/sst-core" >> $GITHUB_ENV
          echo "SST_ELEMENTS_HOME=$PWD/tools/sst-install/sst-elements" >> $GITHUB_ENV

      - name: Export gem5 paths
        run: |
          echo "GEM5_HOME=$PWD/tools/gem5" >> $GITHUB_ENV
          echo "$PWD/tools/gem5/build/X86" >> $GITHUB_PATH

  build:
    needs: setup
    strategy:
      matrix:
        os: [ubuntu-24.04]
        xlen: [32, 64]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo bash ./ci/install_dependencies.sh

      - name: Read version pins
        id: vers
        run: |
          source VERSION
          echo "toolchain=$TOOLCHAIN_REV" >> "$GITHUB_OUTPUT"

      - name: Cache Toolchain Directory
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: tools
          key: ${{ matrix.os }}-toolchain-${{ steps.vers.outputs.toolchain }}

      - name: Cache Third Party Directory
        id: cache-thirdparty
        uses: actions/cache@v4
        with:
          path: third_party
          key: ${{ matrix.os }}-thirdparty-${{ hashFiles('third_party/Makefile', '.gitmodules') }}

      - name: Run Build
        run: |
          TOOLDIR=$PWD/tools
          mkdir -p build${{ matrix.xlen }}
          cd build${{ matrix.xlen }}
          ../configure --tooldir=$TOOLDIR --xlen=${{ matrix.xlen }}
          source ci/toolchain_env.sh
          make software -s
          make tests -s

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.xlen }}
          path: build${{ matrix.xlen }}

  tests:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        # dxa + tensor_wg disabled: features not yet complete (see regression{32,64}_failures.md)
        name: [regression, amo, mpi, dtm, opencl, vulkan, cache, config1, config2, debug, scope, stress, synthesis, vm, rvc, cupbop, hip, tensor, tensor_sp, tensor_mx, gem5]
        xlen: [32, 64]
        # chipStar's hipcc emits Physical64 SPIR-V; POCL refuses it on
        # rv32 Vortex (CL_INVALID_OPERATION). hip is rv64-only until
        # either chipStar grows --offload=spirv32 or the native
        # HIPVortex toolchain lands (see hip_support_proposal.md).
        #        exclude:
          - name: hip
            xlen: 32
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo bash ./ci/install_dependencies.sh

      - name: Read version pins
        id: vers
        run: |
          source VERSION
          echo "toolchain=$TOOLCHAIN_REV" >> "$GITHUB_OUTPUT"

      - name: Cache Toolchain Directory
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: tools
          key: ${{ matrix.os }}-toolchain-${{ steps.vers.outputs.toolchain }}

      - name: Cache Third Party Directory
        id: cache-thirdparty
        uses: actions/cache@v4
        with:
          path: third_party
          key: ${{ matrix.os }}-thirdparty-${{ hashFiles('third_party/Makefile', '.gitmodules') }}

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.xlen }}
          path: build${{ matrix.xlen }}

      - name: Export SST paths
        run: |
          echo "$PWD/tools/sst-install/sst-core/bin" >> $GITHUB_PATH
          echo "$PWD/tools/sst-install/sst-elements/bin" >> $GITHUB_PATH
          echo "SST_CORE_HOME=$PWD/tools/sst-install/sst-core" >> $GITHUB_ENV
          echo "SST_ELEMENTS_HOME=$PWD/tools/sst-install/sst-elements" >> $GITHUB_ENV

      - name: Export gem5 paths
        run: |
          echo "GEM5_HOME=$PWD/tools/gem5" >> $GITHUB_ENV
          echo "$PWD/tools/gem5/build/X86" >> $GITHUB_PATH

      - name: Run tests
        run: |
          cd build${{ matrix.xlen }}
          source ci/toolchain_env.sh
          chmod -R +x . # Ensure all files have executable permissions
          if [ "${{ matrix.name }}" == "regression" ]; then
            ./ci/regression.sh --unittest
            ./ci/regression.sh --riscv
            ./ci/regression.sh --kernel
            ./ci/regression.sh --regression
          else
            ./ci/regression.sh --${{ matrix.name }}
          fi

  complete:
    runs-on: ubuntu-24.04
    needs: tests

    steps:
      - name: Check Completion
        run: echo "All matrix jobs passed"
