[dcr_rtu]
# Ray-Tracing Unit DCRs. See docs/proposals/rtu_simx_v3_proposal.md §5.8.
# Phase 1 fields only; CB_ENTRY / REFORM_THRESH / STATS_RESET reserved for Phase 2-3.
VX_DCR_RTU_STATE_BEGIN      = 0x080
VX_DCR_RTU_CONFIG           = 0x080
VX_DCR_RTU_TLAS_ROOT_LO     = 0x081   # convenience default; NOT consulted by vx_rt_trace
VX_DCR_RTU_TLAS_ROOT_HI     = 0x082
VX_DCR_RTU_CB_ENTRY_LO      = 0x083   # Phase 2: callback dispatcher PC low
VX_DCR_RTU_CB_ENTRY_HI      = 0x084   # Phase 2: callback dispatcher PC high
VX_DCR_RTU_REFORM_THRESH    = 0x085   # Phase 3: reformation threshold
VX_DCR_RTU_STATS_RESET      = 0x086
VX_DCR_RTU_STATE_END        = 0x087
VX_DCR_RTU_STATE_COUNT      = "expr: $VX_DCR_RTU_STATE_END - $VX_DCR_RTU_STATE_BEGIN"

[rtu_slots]
# RTU register file slot IDs — per-(warp,lane) named 32-bit slots
# accessed via vx_rt_set (bulk) / vx_rt_get (scalar).
# Layout matches Vulkan KHR ray-state union; see proposal §4.2.

# Inputs (kernel writes before vx_rt_trace):
VX_RT_RAY_ORIGIN            = 0       # world_ray.origin.{x,y,z} (slots 0..2)
VX_RT_RAY_DIRECTION         = 3       # world_ray.direction.{x,y,z} (slots 3..5)
VX_RT_T_MIN                 = 6
VX_RT_T_MAX                 = 7

# Outputs (HW writes during traversal; kernel reads after vx_rt_wait):
VX_RT_OBJECT_RAY_ORIGIN     = 8       # object_ray.origin.{x,y,z} (post-BLAS transform, slots 8..10)
VX_RT_OBJECT_RAY_DIRECTION  = 11      # object_ray.direction.{x,y,z} (slots 11..13)
VX_RT_HIT_T                 = 14
VX_RT_HIT_BARY_U            = 15
VX_RT_HIT_BARY_V            = 16
VX_RT_HIT_ATTR_0            = 17      # user hit attributes (slots 17..20)
VX_RT_HIT_ATTR_1            = 18
VX_RT_HIT_ATTR_2            = 19
VX_RT_HIT_ATTR_3            = 20
VX_RT_HIT_PRIMITIVE_ID      = 21
VX_RT_HIT_INSTANCE_ID       = 22
VX_RT_HIT_GEOMETRY_INDEX    = 23
VX_RT_HIT_INSTANCE_CUSTOM   = 24

# Misc:
VX_RT_PAYLOAD_PTR_LO        = 25
VX_RT_PAYLOAD_PTR_HI        = 26
VX_RT_RAY_FLAGS             = 27
VX_RT_CULL_MASK             = 28
# Phase 2: callback-context info. Populated by HW before the kernel-
# registered callback dispatcher (mtvec) is entered; read by the
# dispatcher to learn which kind of callback it is and (for IS) the
# candidate hit's geometry index.
VX_RT_CB_TYPE               = 29       # ANYHIT (1) | PROC (2). Phase 2.
# Phase 3-A: per-lane *parked-context handle*. When the cross-warp
# reformation engine gathers entries from multiple slots into one
# virtual warp, the warp the trap fires on no longer uniquely names
# the parked context — the dispatcher's vx_rt_cb_ret needs to carry
# the right *slot's* handle back. HW writes this slot per yielded lane
# before the trap; SfuUnit reads it at vx_rt_cb_ret dispatch and
# forwards it in the CB_ACTION packet, where RtuCore matches by
# handle (not by warp_id). Phase 2 single-warp dispatch ignores it.
VX_RT_CB_HANDLE             = 30       # Phase 3-A.
# Phase 3-A2: per-lane shader-binding-table index for the candidate hit
# that caused this callback. HW extracts this from the triangle's flags
# (bits 8..15) at compute_intersections time, drives reformation
# grouping (lanes sharing (warp_id, sbt_idx) batch into one CB_YIELD),
# and stages it here so the kernel dispatcher can `switch(sbt_idx)` to
# the right shader. Phase 2 single-shader smoke ignores this slot.
VX_RT_HIT_SBT_IDX           = 31       # Phase 3-A2.

VX_RT_SLOT_COUNT            = 32

[rtu_status]
# vx_rt_wait return status. Terminal codes 0..1; yield codes 2..3 (Phase 2);
# error codes >=128.
VX_RT_STS_DONE_HIT          = 0
VX_RT_STS_DONE_MISS         = 1
VX_RT_STS_YIELD_ANYHIT      = 2   # Phase 2
VX_RT_STS_YIELD_PROC        = 3   # Phase 2
VX_RT_STS_ERROR             = 128

[rtu_flags]
# Ray flags (matches SpvRayFlags* semantics).
VX_RT_FLAG_OPAQUE                  = 0x01
VX_RT_FLAG_NO_OPAQUE               = 0x02
VX_RT_FLAG_TERMINATE_ON_FIRST_HIT  = 0x04
VX_RT_FLAG_SKIP_CLOSEST_HIT        = 0x08
VX_RT_FLAG_CULL_BACK_FACING        = 0x10
VX_RT_FLAG_CULL_FRONT_FACING       = 0x20
VX_RT_FLAG_CULL_OPAQUE             = 0x40
VX_RT_FLAG_CULL_NO_OPAQUE          = 0x80
VX_RT_FLAG_SKIP_TRIANGLES          = 0x100
VX_RT_FLAG_SKIP_AABBS              = 0x200   # Phase 2
# Phase 5: opt-in CHS dispatch. When set and the ray commits a hit,
# RtuCore queues a CHS yield through the same trap path as AHS so the
# kernel-registered dispatcher (mtvec) can run closest-hit shading.
# Non-standard vs Vulkan (which inverts to SKIP_CLOSEST_HIT + per-SBT
# CHS registration); kept opt-in here to preserve backward compat with
# Phase 1/2/3-A2 tests that never registered a CHS dispatcher.
VX_RT_FLAG_ENABLE_CHS              = 0x400   # Phase 5

[rtu_cb_actions]
# vx_rt_cb_ret action codes (Phase 2 onwards).
VX_RT_CB_ACCEPT             = 1
VX_RT_CB_IGNORE             = 0
VX_RT_CB_TERMINATE          = 2
# Phase 5: CHS dispatch finished. Tells RtuCore to drain the CHS yield
# without modifying the already-committed hit (i.e. closest-hit shader
# has run; just resume the ray to TERMINAL).
VX_RT_CB_DONE               = 3

[rtu_cb_types]
# VX_RT_CB_TYPE values populated by HW into the RTU register file before
# the callback dispatcher (mtvec) is entered. The dispatcher reads
# VX_RT_CB_TYPE to demultiplex AHS vs IS vs CHS.
VX_RT_CB_TYPE_ANYHIT        = 1
# CB_TYPE_PROC is below at value 2 (procedural intersection / IS).
# Phase 5: closest-hit shader. Fires once per (warp, hit lane) after a
# ray commits its closest opaque or AHS-ACCEPTed hit, gated by the
# ray's VX_RT_FLAG_ENABLE_CHS. Dispatcher exits via vx_rt_cb_ret(DONE).
VX_RT_CB_TYPE_CHS           = 3       # Phase 5
VX_RT_CB_TYPE_PROC          = 2

[traps]
# RISC-V M-mode synchronous trap causes. 0..15 are standard; 24..31 are
# reserved by the privileged spec for custom use. RTU Phase 2 uses 24
# to flag callback-dispatch entry — see docs/proposals/rtu_simx_v3_proposal.md §4.6.
VX_TRAP_CAUSE_BREAKPOINT       = 3
VX_TRAP_CAUSE_ECALL_MMODE      = 11
VX_TRAP_CAUSE_RTU_CALLBACK     = 24    # Phase 2

