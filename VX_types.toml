# Device-identity constants: read-only mvendorid/marchid/mimpid CSR contents.
[isa]
VX_ISA_VENDOR_ID = 0
VX_ISA_ARCH_ID   = 0
VX_ISA_IMPL_ID   = 0

# Device memory map — a HW<->SW contract: the hardware decodes these address
# regions, the linker places code/stack within them, and the runtime addresses
# into them. Relocated from VX_config.toml.
# See docs/proposals/config_hw_sw_layering_proposal.md.
[memmap]
VX_MEM_USER_BASE_ADDR       = "expr: 0x0000000000010000 if ($XLEN == 64) else 0x00010000"
VX_MEM_STACK_LOG2_SIZE      = 13
VX_MEM_STACK_BASE_ADDR      = "expr: 0x00000001FFFF0000 if ($XLEN == 64) else 0xFFFF0000"
VX_MEM_LMEM_BASE_ADDR       = "expr: $VX_MEM_STACK_BASE_ADDR"
VX_MEM_IO_BASE_ADDR         = "expr: 0x0000000000000040 if ($XLEN == 64) else 0x00000040"
VX_MEM_PAGE_TABLE_BASE_ADDR = "expr: 0x00000000F0000000 if ($XLEN == 64) else 0xF0000000"
VX_MEM_IO_COUT_ADDR         = "expr: $VX_MEM_IO_BASE_ADDR"
# Console buffer — lossy per-hart stream rings (proposal §10, post-O-1).
# Layout: wr[SLOTS] u32, rd[SLOTS] u32, data[SLOTS][RING], lost[SLOTS] u32.
# Producer (vx_putchar) drops the byte on a full ring and atomically
# increments lost[slot]; host drain reports "#N: lost K bytes" alongside
# the drained stream. One slot per hart (hartid folded mod SLOTS). Matches
# CUDA's cudaLimitPrintfFifoSize / HIP printf shape: bounded, non-blocking,
# with an overflow indicator. Replaces the legacy spin-on-full path that
# could deadlock a printf-heavy launch (cp_v3_critical_review §4.5, O-1).
VX_MEM_IO_COUT_SLOTS        = 64
VX_MEM_IO_COUT_RING         = 512
VX_MEM_IO_COUT_RING_LOG2    = 9
# total = SLOTS*4 (wr) + SLOTS*4 (rd) + SLOTS*RING (data) + SLOTS*4 (lost)
#       = 64*12 + 64*512 = 33536
VX_MEM_IO_COUT_SIZE         = 33536
VX_MEM_IO_EXIT_CODE         = "expr: ($VX_MEM_IO_COUT_ADDR + $VX_MEM_IO_COUT_SIZE + 8)"
VX_MEM_IO_END_ADDR          = "expr: $VX_MEM_USER_BASE_ADDR"

# VM page-table format — RISC-V architectural constants fixed by the SATP mode
# (SV32 vs SV39, selected by XLEN). Relocated from VX_config.toml.
[vm]
VX_VM_PAGE_LOG2_SIZE = 12
VX_VM_PAGE_SIZE      = "expr: 1 << $VX_VM_PAGE_LOG2_SIZE"
VX_VM_ADDR_MODE      = "expr: 'SV39' if ($XLEN == 64) else 'SV32'"
VX_VM_PT_LEVEL       = "expr: 3 if ($XLEN == 64) else 2"
VX_VM_PTE_SIZE       = "expr: 8 if ($XLEN == 64) else 4"
VX_VM_PT_SIZE        = "expr: $VX_VM_PAGE_SIZE"
VX_VM_PT_SIZE_LIMIT  = "expr: (1 << 25) if ($XLEN == 64) else (1 << 23)"

